<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Final Assessment — BrightMind Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<nav class="navbar scrolled" style="background:var(--white)">
  <div class="nav-container">
    <a href="index.html" class="logo"><span class="logo-icon">✦</span><span>BrightMind<strong>Academy</strong></span></a>
    <div class="nav-links" id="navLinks">
      <a href="courses.html">← My Courses</a>
    </div>
    <button class="hamburger" onclick="toggleNav()" id="hamburger">☰</button>
  </div>
</nav>

<div class="assessment-page">
  <div class="assessment-header">
    <div style="font-size:3rem;margin-bottom:16px">🏆</div>
    <h1>Final Assessment</h1>
    <p>You've completed all the modules! Now take this final test.<br/>Score <strong>75% or above</strong> to earn your certificate.</p>
    <div style="display:flex;gap:16px;justify-content:center;margin-top:20px;flex-wrap:wrap">
      <span style="background:#eff6ff;color:var(--primary);padding:6px 14px;border-radius:8px;font-size:.85rem;font-weight:600">📝 20 Questions</span>
      <span style="background:#fef9c3;color:#854d0e;padding:6px 14px;border-radius:8px;font-size:.85rem;font-weight:600">⏱ No Time Limit</span>
      <span style="background:#d1fae5;color:#065f46;padding:6px 14px;border-radius:8px;font-size:.85rem;font-weight:600">🎯 Pass: 75%</span>
    </div>
  </div>

  <div class="assessment-card">
    <div id="assessment-questions"></div>
    <div style="margin-top:24px;display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn-submit" id="submit-assessment">Submit Assessment</button>
    </div>
    <div class="quiz-result" id="assessment-result" style="margin-top:20px"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
